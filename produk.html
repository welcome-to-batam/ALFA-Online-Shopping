<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;margin:0;background:#f5f5f5;color:#222;padding-bottom:80px}
 .header{position:sticky;top:0;background:#fff;padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid #eee;z-index:10}
 .header a{font-size:24px;text-decoration:none;color:#222;margin-right:12px}
 .header h1{font-size:16px;margin:0;font-weight:600}
 .product-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#fff}
 .card{background:#fff;padding:16px;margin-bottom:8px}
 .price{color:#ee4d2d;font-size:24px;font-weight:700;margin:8px 0}
 .price-old{color:#888;text-decoration:line-through;font-size:14px;margin-left:8px}
 .discount{background:#ee4d2d;color:#fff;font-size:12px;padding:2px 6px;border-radius:4px;font-weight:bold;margin-left:8px}
 .rating{display:flex;align-items:center;gap:8px;color:#666;font-size:14px;margin-bottom:12px}
 .rating.star{color:#faca51}
 .title{font-size:18px;font-weight:600;line-height:1.4;margin:0 0 8px 0}
 .desc-title{font-size:16px;font-weight:600;margin:0 0 8px 0}
 .desc{font-size:14px;line-height:1.6;color:#555}
 .wa-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid #eee;box-shadow:0 -2px 8px rgba(0,0,0,0.1)}
 .btn-wa{width:100%;background:#25D366;color:#fff;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.slider{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;background:#fff}
.slides{display:flex;transition:transform.3s ease}
.slides img{width:100%;flex-shrink:0;object-fit:cover}
.dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#fff5;transition:.3s}
.dot.active{background:#fff}
</style>
</head>
<body>

<header class="header">
  <a href="index.html">←</a>

</header>

  <div class="slider">

  <div class="dots" id="dots"></div>
  </div>

  </div>
  <div>

<div class="card">

<div class="wa-bar" style="display:flex; gap:10px;">

  <button id="waBtn" class="btn-wa" style="flex:1;">Beli Semua</button>

// GANTI NOMOR WA LU DI SINI BRO
const nomorWA = "+6283879387000";

function getId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

const id = getId();
const produk = dataProduk[id];

if (produk) {
  document.getElementById('productName').textContent = produk.nama;
  document.getElementById('productPrice').textContent = `Rp${produk.harga.toLocaleString('id-ID')}`;
 let arrGambar = produk.gambar;
if(!Array.isArray(arrGambar)) arrGambar = [arrGambar]; // <-- INI KUNCINYA ANTI ERROR

const slides = document.getElementById('slides');
const dots = document.getElementById('dots');
slides.innerHTML = '';
dots.innerHTML = '';
arrGambar.forEach((img, i) => {
  slides.innerHTML += `<img src="${img}">`;
  dots.innerHTML += `<span class="dot ${i===0?'active':''}"></span>`;
});

let index = 0;
let startX = 0;
slides.addEventListener('touchstart', e => startX = e.touches[0].clientX);
slides.addEventListener('touchend', e => {
  let diff = e.changedTouches[0].clientX - startX;
  if(diff < -50 && index < arrGambar.length-1) index++;
  if(diff > 50 && index > 0) index--;
  slides.style.transform = `translateX(-${index*100}%)`;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===index));
});
  document.getElementById('productRating').textContent = produk.rating;
  document.getElementById('productSold').textContent = `${produk.terjual} Terjual`;
  document.getElementById('productDesc').textContent = produk.deskripsi;

  if(produk.hargaCoret){
    document.getElementById('productOldPrice').textContent = `Rp${produk.hargaCoret.toLocaleString('id-ID')}`;
    const diskonPersen = Math.round((1 - produk.harga / produk.hargaCoret) * 100);
    document.getElementById('productDiscount').textContent = `-${diskonPersen}%`;
  }

// AMBIL DATA KERANJANG DARI TRUK
let keranjang = JSON.parse(localStorage.getItem('keranjang')) || [];

// TOMBOL BIRU: MASUKIN BARANG YANG LAGI DILIHAT KE KERANJANG
document.getElementById('tambahKeranjangBtn').onclick = () => {
  keranjang.push({nama: produk.nama, harga: produk.harga, gambar: produk.gambar});
  localStorage.setItem('keranjang', JSON.stringify(keranjang));
  alert(produk.nama + ' masuk keranjang! Total: ' + keranjang.length);
  
  updateTombolBeliSemua();
};

// TOMBOL IJO: CHECKOUT SEMUA ISI KERANJANG
function updateTombolBeliSemua() {
  if(keranjang.length === 0){
    document.getElementById('waBtn').innerText = 'WhatsApp';
    document.getElementById('waBtn').style.background = '#ccc';
    document.getElementById('waBtn').onclick = () => alert('Isi keranjang dulu bro');
    return;
  }

  let pesan = `Halo ALFA Shop, saya mau order:\n\n`;
  let total = 0;
  keranjang.forEach((item, index) => {
    pesan += `${index+1}. ${item.nama} - Rp${item.harga.toLocaleString('id-ID')}\n`;
    total += item.harga;
  });
  pesan += `\nTotal: Rp${total.toLocaleString('id-ID')}`;

  document.getElementById('waBtn').innerText = `Beli Semua (${keranjang.length})`;
  document.getElementById('waBtn').onclick = () => {
    window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`, '_blank');
  };
}

// JALANIN PAS HALAMAN BUKA
updateTombolBeliSemua();
  
} else {
  document.body.innerHTML = '<h1 style="text-align:center;padding:50px">Produk tidak ditemukan</h1>';

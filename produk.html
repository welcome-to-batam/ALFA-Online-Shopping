<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Produk</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;margin:0;background:#f5f5f5;color:#222;padding-bottom:80px}
.header{position:sticky;top:0;background:#fff;padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid #eee;z-index:10}
.header a{font-size:24px;text-decoration:none;color:#222;margin-right:12px}
.header h1{font-size:16px;margin:0;font-weight:600}
.product-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#fff}
.card{background:#fff;padding:16px;margin-bottom:8px}
.price{color:#ee4d2d;font-size:24px;font-weight:700;margin:8px 0}
.price-old{color:#888;text-decoration:line-through;font-size:14px;margin-left:8px}
.discount{background:#ee4d2d;color:#fff;font-size:12px;padding:2px 6px;border-radius:4px;font-weight:bold;margin-left:8px}
.rating{display:flex;align-items:center;gap:8px;color:#666;font-size:14px;margin-bottom:12px}
.rating.star{color:#faca51}
.title{font-size:18px;font-weight:600;line-height:1.4;margin:0 0 8px 0}
.desc-title{font-size:16px;font-weight:600;margin:0 0 8px 0}
.desc{font-size:14px;line-height:1.6;color:#555}
.wa-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px;border-top:1px solid #eee;box-shadow:0 -2px 8px rgba(0,0,0,0.1)}
.btn-wa{width:100%;background:#25D366;color:#fff;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.btn-wa:hover { background: #1ebe5b; }
.slider{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;background:#fff}
.slides{display:flex;transition:transform.3s ease}
.slides img{width:100%;flex-shrink:0;object-fit:cover}
.dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#fff5;transition:.3s}
.dot.active{background:#fff}
</style>
</head>
<body>

<header class="header">
  <a href="index.html">←</a>
  <h1>Detail Produk</h1>
</header>

  <div class="slider">
  <div class="slides" id="slides"></div>
  <div class="dots" id="dots"></div>
  </div>

<div class="card">
  <h2 id="productName" class="title">Loading...</h2>
  <div class="rating">
    <span class="star">★</span>
    <span id="productRating">4.9</span>
    <span>|</span>
    <span id="productSold">0 Terjual</span>
  </div>
  <div>
    <span id="productPrice" class="price">Rp0</span>
    <span id="productOldPrice" class="price-old"></span>
    <span id="productDiscount" class="discount"></span>
  </div>
</div>

<div class="card">
  <h3 class="desc-title">Deskripsi Produk</h3>
  <p id="productDesc" class="desc">Loading...</p>
</div>

<div class="wa-bar">
  <button id="waBtn" class="btn-wa"><i class='bx bxl-whatsapp'></i> Beli via WhatsApp</button>
</div>

<script>
const dataProduk = {
  "1": {
    nama: "TWS Warna Hitam",
    harga: 55000,
    hargaCoret: 60000,
    gambar: ["img/produk-1/warnahitam1.jpg", "img/produk-1/warnahitam2.jpg", "img/produk-1/warnahitam3.jpg", "img/produk-1/warnahitam4.jpg", "img/produk-1/warnahitam5.jpg", "img/produk-1/warnahitam6.jpg", "img/produk-1/warnahitam7.jpg", "img/produk-1/warnahitam8.jpg", "img/produk-1/warnahitam9.jpg", "img/produk-1/warnahitam10.jpg"],
    rating: "4.9",
    terjual: "10 pcs",
    deskripsi: "TWS Bluetooth Wireless adalah earphone pintar yang dirancang untuk pengguna aktif yang ingin kualitas suara jernih, koneksi cepat, dan desain ergonomis. Cocok untuk menemani kegiatan sehari-hari."
  },
  "2": {
    nama: "Hand Rest Grip",
    harga: 18000,
    hargaCoret: 22000,
    gambar: ["img/produk-2honda/honda1.jpg", "img/produk-2honda/honda2.jpg", "img/produk-2honda/honda3.jpg", "img/produk-2honda/honda4.jpg", "img/produk-2honda/honda5.jpg", "img/produk-2honda/honda6.jpg", "img/produk-2honda/honda7.jpg", "img/produk-2honda/honda8.jpg", "img/produk-2honda/honda9.jpg", "img/produk-2honda/honda10.jpg"],
    rating: "4.8",
    terjual: "00 pcs",
    deskripsi: "Nikmati kenyamanan berkendara jarak jauh tanpa pegal dengan Hand Rest/Penahan Gas Motor."
  },
  "3": {
    nama: "Alat Angkat Galon",
    harga: 17000,
    hargaCoret: 22000,
    gambar: ["img/produk-3/galon1.jpg", "img/produk-3/galon2.jpg", "img/produk-3/galon3.jpg", "img/produk-3/galon4.jpg", "img/produk-3/galon5.jpg", "img/produk-3/galon6.jpg", "img/produk-3/galon7.jpg", "img/produk-3/galon8.jpg", "img/produk-3/galon9.jpg", "img/produk-3/galon10.jpg"],
    rating: "4.9",
    terjual: "00 pcs",
    deskripsi: "Alat Angkat Galon / Holder pengangkat galon / Alat bantu angkat galon dobel hendle"
  },
  "4": { 
    nama: "TWS Warna Pink (STOK KOSONG)",
    harga: 55000, 
    hargaCoret: 60000, 
    gambar: ["img/produk-4/pink1.jpg", "img/produk-4/pink2.jpg"], 
    rating: "4.8", 
    terjual: "01 pcs", 
    deskripsi: "TWS Earbuds terbaru"
  },
  "5": { 
    nama: "TWS Warna Coklat (STOK KOSONG)", 
    harga: 55000, 
    hargaCoret: 60000, 
    gambar: ["img/produk-5/coklat1.jpg", "img/produk-5/coklat2.jpg"], 
    rating: "4.9", 
    terjual: "01 pcs", 
    deskripsi: "TWS Earbuds terbaru" 
  },
  "6": { 
    nama: "TWS Warna Biru (STOK KOSONG)", 
    harga: 55000, 
    hargaCoret: 60000, 
    gambar: ["img/produk-6/biru1.jpg", "img/produk-6/biru2.jpg"], 
    rating: "4.8", 
    terjual: "01 pcs", 
    deskripsi: "TWS Earbuds terbaru" 
  },
  "7": { 
    nama: "TWS Warna Ungu (STOK KOSONG)", 
    harga: 55000, 
    hargaCoret: 60000, 
    gambar: ["img/produk-7/ungu1.jpg", "img/produk-7/ungu2.jpg"], 
    rating: "4.9", 
    terjual: "01 pcs", 
    deskripsi: "TWS Earbuds terbaru" 
  },
  "8": { 
    nama: "TWS Warna Putih (STOK KOSONG)", 
    harga: 55000, 
    hargaCoret: 60000, 
    gambar: ["img/produk-8/putih1.jpg"], 
    rating: "4.8", 
    terjual: "01 pcs", 
    deskripsi: "TWS Earbuds terbaru" 
  },
};

// GANTI NOMOR WA LU DI SINI BRO
const nomorWA = "6283879387000"; // tanpa +

// Pindahkan arrGambar ke sini agar bisa diakses oleh fungsi zoom
let arrGambar = []; 

function getId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

const id = getId();
const produk = dataProduk[id];

if (produk) {
  document.getElementById('productName').textContent = produk.nama;
  document.getElementById('productPrice').textContent = `Rp${produk.harga.toLocaleString('id-ID')}`;

  // Masukkan data gambar ke variabel global tadi
  arrGambar = produk.gambar;
  if(!Array.isArray(arrGambar)) arrGambar = [arrGambar];

  const slides = document.getElementById('slides');
  const dots = document.getElementById('dots');
  slides.innerHTML = '';
  dots.innerHTML = '';
  
  arrGambar.forEach((img, i) => {
    slides.innerHTML += `<img src="${img}" style="width:100%; height:400px; object-fit:cover; flex-shrink:0; cursor:zoom-in;" onclick="bukaZoom(${i})">`;
    dots.innerHTML += `<span class="dot ${i===0?'active':''}"></span>`;
  });

  let index = 0;
  let startX = 0;
  slides.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  slides.addEventListener('touchend', e => {
    let diff = e.changedTouches[0].clientX - startX;
    if(diff < -50 && index < arrGambar.length-1) index++;
    if(diff > 50 && index > 0) index--;
    slides.style.transform = `translateX(-${index*100}%)`;
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===index));
  });

  document.getElementById('productRating').textContent = produk.rating;
  document.getElementById('productSold').textContent = `${produk.terjual} Terjual`;
  document.getElementById('productDesc').textContent = produk.deskripsi;

  if(produk.hargaCoret){
    document.getElementById('productOldPrice').textContent = `Rp${produk.hargaCoret.toLocaleString('id-ID')}`;
    const diskonPersen = Math.round((1 - produk.harga / produk.hargaCoret) * 100);
    document.getElementById('productDiscount').textContent = `-${diskonPersen}%`;
  }

  // TOMBOL WA SATUAN
  document.getElementById('waBtn').onclick = () => {
    const pesan = `Halo ALFA Online Shopping 🙏%0A%0A` +
                  `Saya mau pesan:%0A` +
                  `*${produk.nama}*%0A` +
                  `Harga: Rp ${produk.harga.toLocaleString('id-ID')}%0A` +
                  `Jumlah: 1 pcs%0A%0A` +
                  `Terima kasih`;
    const urlWA = `https://wa.me/${nomorWA}?text=${pesan}`;
    window.open(urlWA, '_blank');
  };

} else {
  document.body.innerHTML = '<h1 style="text-align:center;padding:50px">Produk tidak ditemukan</h1>';
}

// ============ FITUR ZOOM GALERI ============

let zoomIndex = 0; 

function bukaZoom(idx) {
  zoomIndex = idx;
  tampilkanGambarZoom();
  document.getElementById('overlayZoom').style.display = 'flex';
  
  // Pasang event listener swipe HANYA saat overlay dibuka
  const overlayEl = document.getElementById('overlayZoom');
  overlayEl.ontouchstart = (e) => {
    if (e.touches.length === 1) {
      overlayEl.dataset.startX = e.touches[0].clientX;
      overlayEl.dataset.isSwiping = "true";
    } else {
      overlayEl.dataset.isSwiping = "false";
    }
  };
  
  overlayEl.ontouchmove = (e) => {
    if (e.touches.length > 1) overlayEl.dataset.isSwiping = "false";
  };
  
  overlayEl.ontouchend = (e) => {
    if (overlayEl.dataset.isSwiping === "true" && e.changedTouches.length === 1) {
      let diff = e.changedTouches[0].clientX - parseFloat(overlayEl.dataset.startX);
      if(diff < -50) nextZoom();
      if(diff > 50) prevZoom();
    }
    overlayEl.dataset.isSwiping = "false";
  };
}

function tampilkanGambarZoom() {
  const imgZoom = document.getElementById('gambarZoom');
  imgZoom.src = arrGambar[zoomIndex]; 
  
  document.getElementById('prevZoom').style.display = zoomIndex === 0 ? 'none' : 'block';
  document.getElementById('nextZoom').style.display = zoomIndex === arrGambar.length - 1 ? 'none' : 'block';
  document.getElementById('zoomIndicator').textContent = `${zoomIndex + 1} / ${arrGambar.length}`;
}

function nextZoom() {
  if (zoomIndex < arrGambar.length - 1) {
    zoomIndex++;
    tampilkanGambarZoom();
  }
}

function prevZoom() {
  if (zoomIndex > 0) {
    zoomIndex--;
    tampilkanGambarZoom();
  }
}

function tutupZoom() {
  document.getElementById('overlayZoom').style.display = 'none';
  // Bersihkan event listener saat ditutup agar tidak mengganggu pinch zoom browser
  const overlayEl = document.getElementById('overlayZoom');
  overlayEl.ontouchstart = null;
  overlayEl.ontouchmove = null;
  overlayEl.ontouchend = null;
    }
</script>

  <!-- Overlay Zoom Gambar -->
<div id="overlayZoom" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; flex-direction:column; touch-action:pan-y pinch-zoom;">
  
  <!-- Tombol Tutup (X) -->
  <span onclick="tutupZoom()" style="position:absolute; top:20px; right:25px; color:white; font-size:35px; font-weight:bold; cursor:pointer; z-index:10;">&times;</span>
  
  <!-- Tombol Kiri (<) -->
  <span id="prevZoom" onclick="prevZoom()" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); font-size:40px; color:white; cursor:pointer; user-select:none; background:rgba(0,0,0,0.4); padding:5px 15px; border-radius:50%; z-index:10;">&#10094;</span>
  
  <!-- Gambar Zoom -->
  <img id="gambarZoom" src="" style="max-width:90%; max-height:80%; object-fit:contain;">
  
  <!-- Tombol Kanan (>) -->
  <span id="nextZoom" onclick="nextZoom()" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); font-size:40px; color:white; cursor:pointer; user-select:none; background:rgba(0,0,0,0.4); padding:5px 15px; border-radius:50%; z-index:10;">&#10095;</span>
  
  <!-- Indikator Halaman -->
  <div id="zoomIndicator" style="position:absolute; bottom:30px; color:white; font-size:16px; background:rgba(0,0,0,0.5); padding:5px 15px; border-radius:15px;"></div>

</div>
  
</body>
</html>
